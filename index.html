<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oasis</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <button class="brand-button" id="homeButton" type="button">Oasis</button>
        <button class="text-button" id="loginButton" type="button">Login</button>
      </header>

      <main id="app" class="app-main" aria-live="polite"></main>
    </div>

    <div class="modal-backdrop hidden" id="loginModal" role="presentation">
      <section class="pin-dialog" role="dialog" aria-modal="true" aria-labelledby="pinTitle">
        <button class="icon-button" id="closeLoginButton" type="button" aria-label="Close login">
          &times;
        </button>
        <h2 id="pinTitle">Psychiatrist Login</h2>
        <form id="pinForm" novalidate>
          <label for="pinInput">PIN</label>
          <input
            id="pinInput"
            name="pin"
            type="password"
            inputmode="numeric"
            pattern="[0-9]*"
            autocomplete="off"
            maxlength="8"
          >
          <p class="error-message" id="pinError" aria-live="polite"></p>
          <div class="dialog-actions">
            <button class="secondary-button" id="cancelLoginButton" type="button">Cancel</button>
            <button class="primary-button" type="submit">Enter</button>
          </div>
        </form>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
